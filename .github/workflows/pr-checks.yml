name: PR Quality Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-frontend:
    name: 🔍 Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Check for build errors
        working-directory: frontend
        env:
          CI: false
        run: npm run build

  lint-backend:
    name: 🔍 Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        working-directory: backend
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E303 || true

  size-check:
    name: 📦 Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci --legacy-peer-deps
      - working-directory: frontend
        env:
          CI: false
        run: |
          npm run build
          echo "Build size:"
          du -sh build/
          du -sh build/static/js/*.js 2>/dev/null || true
