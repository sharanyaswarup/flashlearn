name: FlashLearn CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test & Lint
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend (smoke test)
        working-directory: frontend
        env:
          CI: false
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint backend
        working-directory: backend
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503 || true

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Render (main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_HOOK }}"
          echo "Backend deploy triggered"

      - name: Trigger Render frontend deploy
        run: |
          curl -s "${{ secrets.RENDER_FRONTEND_HOOK }}"
          echo "Frontend deploy triggered"
