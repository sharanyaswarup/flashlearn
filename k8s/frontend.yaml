apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashlearn-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flashlearn-frontend
  template:
    metadata:
      labels:
        app: flashlearn-frontend
    spec:
      containers:
      - name: frontend
        image: flashlearn-frontend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: flashlearn-frontend-service
spec:
  selector:
    app: flashlearn-frontend
  ports:
  - port: 80
    targetPort: 80
  type: NodePort