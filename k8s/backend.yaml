apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashlearn-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flashlearn-backend
  template:
    metadata:
      labels:
        app: flashlearn-backend
    spec:
      containers:
      - name: backend
        image: flashlearn-backend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flashlearn-backend-service
spec:
  selector:
    app: flashlearn-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP